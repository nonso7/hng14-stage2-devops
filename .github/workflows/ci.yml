name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  API_IMAGE_NAME: job-api
  WORKER_IMAGE_NAME: job-worker
  FRONTEND_IMAGE_NAME: job-frontend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: python -m pip install flake8==7.1.1

      - name: flake8 (api, worker)
        run: flake8 api worker

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install eslint
        working-directory: frontend
        run: npm install --no-save eslint@^9.15.0

      - name: eslint
        working-directory: frontend
        run: npx eslint app.js healthcheck.js

      - name: hadolint (api)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: error

      - name: hadolint (worker)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          failure-threshold: error

      - name: hadolint (frontend)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    outputs:
      sha: ${{ steps.tags.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive short SHA
        id: tags
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build & push API image
        run: |
          docker build \
            -t localhost:5000/${API_IMAGE_NAME}:latest \
            -t localhost:5000/${API_IMAGE_NAME}:${{ steps.tags.outputs.sha }} \
            ./api
          docker push --all-tags localhost:5000/${API_IMAGE_NAME}

      - name: Build & push worker image
        run: |
          docker build \
            -t localhost:5000/${WORKER_IMAGE_NAME}:latest \
            -t localhost:5000/${WORKER_IMAGE_NAME}:${{ steps.tags.outputs.sha }} \
            ./worker
          docker push --all-tags localhost:5000/${WORKER_IMAGE_NAME}

      - name: Build & push frontend image
        run: |
          docker build \
            -t localhost:5000/${FRONTEND_IMAGE_NAME}:latest \
            -t localhost:5000/${FRONTEND_IMAGE_NAME}:${{ steps.tags.outputs.sha }} \
            ./frontend
          docker push --all-tags localhost:5000/${FRONTEND_IMAGE_NAME}

      - name: Save images for downstream jobs
        run: |
          mkdir -p /tmp/images
          docker save localhost:5000/${API_IMAGE_NAME}:latest      -o /tmp/images/api.tar
          docker save localhost:5000/${WORKER_IMAGE_NAME}:latest   -o /tmp/images/worker.tar
          docker save localhost:5000/${FRONTEND_IMAGE_NAME}:latest -o /tmp/images/frontend.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/images
          retention-days: 1

  security-scan:
    name: Trivy scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/images

      - name: Load images into local daemon
        run: |
          docker load -i /tmp/images/api.tar
          docker load -i /tmp/images/worker.tar
          docker load -i /tmp/images/frontend.tar

      - name: Trivy findings (api)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: localhost:5000/job-api:latest
          severity: CRITICAL
          exit-code: "0"
          format: table
          ignore-unfixed: true

      - name: Trivy SARIF (api)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: localhost:5000/job-api:latest
          severity: CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-api.sarif
          ignore-unfixed: true

      - name: Trivy findings (worker)
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: localhost:5000/job-worker:latest
          severity: CRITICAL
          exit-code: "0"
          format: table
          ignore-unfixed: true

      - name: Trivy SARIF (worker)
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: localhost:5000/job-worker:latest
          severity: CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-worker.sarif
          ignore-unfixed: true

      - name: Trivy findings (frontend)
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: localhost:5000/job-frontend:latest
          severity: CRITICAL
          exit-code: "0"
          format: table
          ignore-unfixed: true

      - name: Trivy SARIF (frontend)
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: localhost:5000/job-frontend:latest
          severity: CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-frontend.sarif
          ignore-unfixed: true

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-*.sarif

  integration-test:
    name: Integration test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/images

      - name: Load and retag images
        run: |
          docker load -i /tmp/images/api.tar
          docker load -i /tmp/images/worker.tar
          docker load -i /tmp/images/frontend.tar
          docker tag localhost:5000/${API_IMAGE_NAME}:latest      ${API_IMAGE_NAME}:latest
          docker tag localhost:5000/${WORKER_IMAGE_NAME}:latest   ${WORKER_IMAGE_NAME}:latest
          docker tag localhost:5000/${FRONTEND_IMAGE_NAME}:latest ${FRONTEND_IMAGE_NAME}:latest

      - name: Create .env from .env.example
        run: cp .env.example .env

      - name: Bring stack up
        run: docker compose up -d --wait --wait-timeout 120

      - name: Show service health
        run: docker compose ps

      - name: Run integration test script
        run: bash scripts/integration-test.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans

  deploy:
    name: Rolling deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/images

      - name: Load and retag images
        run: |
          docker load -i /tmp/images/api.tar
          docker load -i /tmp/images/worker.tar
          docker load -i /tmp/images/frontend.tar
          docker tag localhost:5000/${API_IMAGE_NAME}:latest      ${API_IMAGE_NAME}:latest
          docker tag localhost:5000/${WORKER_IMAGE_NAME}:latest   ${WORKER_IMAGE_NAME}:latest
          docker tag localhost:5000/${FRONTEND_IMAGE_NAME}:latest ${FRONTEND_IMAGE_NAME}:latest

      - name: Bring current stack up
        run: |
          cp .env.example .env
          docker compose up -d --wait --wait-timeout 120

      - name: Rolling deploy (worker)
        run: bash scripts/rolling-deploy.sh worker

      - name: Rolling deploy (api)
        run: TIMEOUT=60 bash scripts/rolling-deploy.sh api

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
